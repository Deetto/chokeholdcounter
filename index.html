* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0;
  padding: 0;
  background: #0b0b0d;
  color: #f2c200;
  font-family: 'BebasNeue', Impact, sans-serif;
  height: 100%;
  overflow-x: hidden;
  user-select: none;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 24px 16px 40px;
}

h1 {
  font-size: clamp(28px, 8vw, 40px);
  letter-spacing: 1px;
  margin: 8px 0 2px;
  text-align: center;
  text-shadow: 0 0 18px rgba(242,194,0,0.35);
}

.subtitle {
  font-family: Georgia, serif;
  font-style: italic;
  color: #8a8a8a;
  font-size: 13px;
  text-align: center;
  margin-bottom: 18px;
}

.illustration {
  width: 100%;
  max-width: 420px;
  border-radius: 10px;
  border: 2px solid #f2c200;
  box-shadow: 0 0 30px rgba(0,0,0,0.6);
  display: block;
  margin-bottom: 22px;
}

.count {
  font-size: clamp(72px, 26vw, 120px);
  line-height: 1;
  margin: 4px 0 18px;
  transition: transform 0.12s ease;
}

.count.pulse {
  transform: scale(1.15);
}

.buttons {
  display: flex;
  gap: 14px;
  width: 100%;
  max-width: 420px;
}

button {
  font-family: 'BebasNeue', Impact, sans-serif;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  letter-spacing: 1px;
  transition: transform 0.08s ease, filter 0.08s ease;
}

button:active {
  transform: scale(0.95);
  filter: brightness(0.9);
}

.btn-inc {
  flex: 3;
  background: #f2c200;
  color: #0b0b0d;
  font-size: clamp(20px, 6vw, 26px);
  padding: 18px 10px;
}

.btn-reset {
  flex: 1;
  background: #c0392b;
  color: #fff;
  font-size: 15px;
  padding: 18px 6px;
}

.footer-note {
  color: #4a4a4d;
  font-size: 11px;
  margin-top: 26px;
  text-align: center;
  font-family: Georgia, serif;
}

/* simple confirm dialog for reset */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}

.overlay.show { display: flex; }

.dialog {
  background: #151517;
  border: 2px solid #c0392b;
  border-radius: 12px;
  padding: 24px;
  max-width: 320px;
  text-align: center;
}

.dialog p {
  color: #ddd;
  font-family: Georgia, serif;
  font-size: 14px;
  margin-bottom: 18px;
}

.dialog-buttons {
  display: flex;
  gap: 10px;
}

.dialog-buttons button {
  flex: 1;
  padding: 12px;
  font-size: 16px;
}

.btn-cancel {
  background: #333;
  color: #eee;
}
</style>
</head>
<body>

<div class="count" id="count">0</div>

<div class="buttons">
  <button class="btn-inc" id="incBtn">+1 CHOKE-HOLD</button>
  <button class="btn-reset" id="resetBtn">Reset</button>
</div>

<div class="footer-note">Your count is saved on this device only.</div>

<div class="overlay" id="overlay">
  <div class="dialog">
    <p>Reset the count back to zero on this device?</p>
    <div class="dialog-buttons">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-reset" id="confirmResetBtn">Reset</button>
    </div>
  </div>
</div>

<script>
const KEY = 'chokehold_count';
const countEl = document.getElementById('count');
const incBtn = document.getElementById('incBtn');
const resetBtn = document.getElementById('resetBtn');
const overlay = document.getElementById('overlay');
const cancelBtn = document.getElementById('cancelBtn');
const confirmResetBtn = document.getElementById('confirmResetBtn');

let count = parseInt(localStorage.getItem(KEY) || '0', 10);
if (isNaN(count)) count = 0;
render();

function render() {
  countEl.textContent = count;
}

function pulse() {
  countEl.classList.add('pulse');
  setTimeout(() => countEl.classList.remove('pulse'), 120);
}

incBtn.addEventListener('click', () => {
  count += 1;
  localStorage.setItem(KEY, String(count));
  render();
  pulse();
  if (navigator.vibrate) navigator.vibrate(20);
});

resetBtn.addEventListener('click', () => {
  overlay.classList.add('show');
});

cancelBtn.addEventListener('click', () => {
  overlay.classList.remove('show');
});

confirmResetBtn.addEventListener('click', () => {
  count = 0;
  localStorage.setItem(KEY, '0');
  render();
  overlay.classList.remove('show');
});

// Register service worker for basic offline support (optional, safe no-op if unsupported)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
